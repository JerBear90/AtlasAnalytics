version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: atlas_portal
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: ${DB_PASSWORD:-atlas_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build: ./server
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgres://atlas:${DB_PASSWORD:-atlas_dev_password}@db:5432/atlas_portal
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      PORT: 4000
      CLIENT_URL: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

  client:
    build: ./client
    ports:
      - "3000:80"
    depends_on:
      - server

volumes:
  pgdata:

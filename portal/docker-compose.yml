version: '3.8'

services:
  server:
    build: ./server
    restart: always
    ports:
      - "4000:4000"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      PORT: 4000
      CLIENT_URL: https://portal.atlasanalytics.com
      NODE_ENV: production
    volumes:
      - server-data:/app/data

  client:
    build: ./client
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - server

volumes:
  server-data:
